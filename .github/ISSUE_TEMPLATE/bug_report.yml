name: Bug report
description: Something is not working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below.

  - type: input
    id: swiftsonic_version
    attributes:
      label: SwiftSonic version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: input
    id: swift_version
    attributes:
      label: Swift / Xcode version
      placeholder: "e.g. Swift 6.0 / Xcode 16.2"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "e.g. iOS 17, macOS 14, visionOS 1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal code snippet or steps to reproduce the issue.
      render: swift
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, stack traces, or anything else that might help.
